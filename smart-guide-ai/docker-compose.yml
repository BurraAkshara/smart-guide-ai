version: '3.9'

services:

  # ── MongoDB ──────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: sga-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-sgaadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-sgapassword123}
      MONGO_INITDB_DATABASE: smart-guide-ai
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - sga-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Express) ─────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: sga-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV:     production
      PORT:         5000
      MONGODB_URI:  mongodb://${MONGO_USER:-sgaadmin}:${MONGO_PASS:-sgapassword123}@mongo:27017/smart-guide-ai?authSource=admin
      JWT_SECRET:   ${JWT_SECRET:-change_this_in_production_please}
      JWT_EXPIRES:  7d
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - sga-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 3

  # ── Frontend (React + Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
    container_name: sga-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://backend:5000/api
    depends_on:
      - backend
    networks:
      - sga-network

# ── Named volumes ──────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local

# ── Network ────────────────────────────────────────────────────
networks:
  sga-network:
    driver: bridge
